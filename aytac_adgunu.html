<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aytac — Ad Günün Mübarək! 🎂</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@300;400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100vh;}
body{
  min-height:100vh;
  background:linear-gradient(160deg,#ff6ec7 0%,#a855f7 30%,#3b82f6 60%,#06b6d4 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Nunito',sans-serif;overflow:hidden;position:relative;
}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
.content{position:relative;z-index:10;text-align:center;padding:2.5rem 1.5rem;max-width:540px;}

.garden{display:flex;justify-content:center;align-items:flex-end;gap:8px;margin-bottom:2rem;flex-wrap:wrap;}
.flower{opacity:0;transform:scale(0) translateY(50px);animation:bloom .7s cubic-bezier(.34,1.56,.64,1) forwards;}
.flower:nth-child(1){animation-delay:.1s;} .flower:nth-child(2){animation-delay:.35s;}
.flower:nth-child(3){animation-delay:.6s;} .flower:nth-child(4){animation-delay:.85s;}
.flower:nth-child(5){animation-delay:1.1s;} .flower:nth-child(6){animation-delay:1.35s;}
.flower:nth-child(7){animation-delay:1.6s;}
@keyframes bloom{to{opacity:1;transform:scale(1) translateY(0);}}
.flower svg{animation:sway 2.5s ease-in-out infinite alternate;transform-origin:bottom center;}
.flower:nth-child(even) svg{animation-direction:alternate-reverse;}
@keyframes sway{from{transform:rotate(-7deg);}to{transform:rotate(7deg);}}

.label{font-family:'Nunito',sans-serif;font-weight:300;font-size:.85rem;letter-spacing:.5em;color:rgba(255,255,255,.85);text-transform:uppercase;margin-bottom:.4rem;opacity:0;animation:fadeUp .8s ease forwards;animation-delay:2s;}
.name{font-family:'Dancing Script',cursive;font-size:clamp(3.5rem,14vw,6.5rem);color:#fff;line-height:1;text-shadow:0 0 50px rgba(255,255,255,.5),0 4px 20px rgba(0,0,0,.15);margin-bottom:.3rem;opacity:0;animation:fadeUp .8s ease forwards;animation-delay:2.2s;}
.wish{font-family:'Dancing Script',cursive;font-size:clamp(1.4rem,6vw,2.3rem);color:#ffe0f7;margin-bottom:1.2rem;opacity:0;animation:fadeUp .8s ease forwards;animation-delay:2.5s;}
.msg{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:300;color:rgba(255,255,255,.88);line-height:1.9;max-width:400px;margin:0 auto 2rem;opacity:0;animation:fadeUp .8s ease forwards;animation-delay:2.8s;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

.btn{opacity:0;animation:fadeUp .8s ease forwards;animation-delay:3.1s;background:rgba(255,255,255,.2);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.55);color:#fff;padding:14px 38px;border-radius:50px;font-size:1rem;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:transform .2s,background .2s;letter-spacing:.05em;}
.btn:hover{transform:scale(1.08);background:rgba(255,255,255,.3);}

.star-layer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;}
.fstar{position:absolute;background:#fff;border-radius:50%;animation:float-up 4s ease-in-out infinite;}
@keyframes float-up{0%{opacity:0;transform:translateY(0) scale(1);}30%{opacity:1;}80%{opacity:.6;}100%{opacity:0;transform:translateY(-90px) scale(.2);}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="star-layer" id="stars"></div>

<div class="content">
  <div class="garden" id="garden"></div>
  <p class="label"></p>
  <h1 class="name">Aytac</h1>
  <p class="wish">Ad günün mübarək! 🎂</p>
  <p class="msg">Rəbbim sənə uzun,sağlıqlı, xoşbəxt ən əsası xeyirli bir ömür nəsib etsin. Xeyirlisi ilə bütün duaların ən rahat şəkildə ən doğru zamanda qəbul olsun.Amin🤲🏻
Bir daha Təbriklər 🤩🥳👏🏻, Böyük qız olasan😅</p>
  <button class="btn" id="partyBtn">🎉 Bayram et!</button>
</div>

<script>
const flowers=[
  {p:'#ff6ec7',c:'#fff176',s:'#4ade80'},
  {p:'#a78bfa',c:'#fde047',s:'#34d399'},
  {p:'#fb923c',c:'#fef08a',s:'#4ade80'},
  {p:'#38bdf8',c:'#fde047',s:'#34d399'},
  {p:'#f472b6',c:'#fff176',s:'#4ade80'},
  {p:'#facc15',c:'#fb923c',s:'#34d399'},
  {p:'#86efac',c:'#fde047',s:'#4ade80'},
];

function makeSVG(f,sz=80){
  const cx=sz/2,cy=sz*.42,r=sz*.22;
  let petals='';
  for(let i=0;i<8;i++){
    const a=i*45*Math.PI/180;
    const px=cx+Math.cos(a)*r*1.15,py=cy+Math.sin(a)*r*1.15;
    petals+=`<ellipse cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" rx="${(r*.55).toFixed(1)}" ry="${(r*.3).toFixed(1)}" fill="${f.p}" opacity=".93" transform="rotate(${i*45} ${px.toFixed(1)} ${py.toFixed(1)})"/>`;
  }
  return `<svg viewBox="0 0 ${sz} ${sz+sz*.22}" width="${sz}" height="${sz+sz*.22}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${cx}" y1="${cy+r*.5}" x2="${cx}" y2="${sz+sz*.18}" stroke="${f.s}" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="${cx}" y1="${cy+r*2.2}" x2="${cx+sz*.16}" y2="${cy+r*1.5}" stroke="${f.s}" stroke-width="1.8" stroke-linecap="round"/>
    ${petals}
    <circle cx="${cx}" cy="${cy}" r="${(r*.38).toFixed(1)}" fill="${f.c}"/>
    <circle cx="${cx}" cy="${cy}" r="${(r*.15).toFixed(1)}" fill="rgba(0,0,0,.1)"/>
  </svg>`;
}

const garden=document.getElementById('garden');
[62,70,80,90,80,70,62].forEach((sz,i)=>{
  const d=document.createElement('div');d.className='flower';
  d.innerHTML=makeSVG(flowers[i],sz);garden.appendChild(d);
});

const starsEl=document.getElementById('stars');
for(let i=0;i<50;i++){
  const s=document.createElement('div');s.className='fstar';
  const sz=Math.random()*3+1.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${3+Math.random()*3}s;opacity:${.4+Math.random()*.6}`;
  starsEl.appendChild(s);
}

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();window.addEventListener('resize',resize);

let pieces=[],balloons=[],animId=null;
const COLORS=['#ff6ec7','#a78bfa','#fb923c','#38bdf8','#facc15','#f472b6','#86efac','#fff','#fde047','#c084fc'];

function launchAll(){
  for(let i=0;i<220;i++){
    pieces.push({
      x:Math.random()*canvas.width,y:-10,
      w:7+Math.random()*7,h:3+Math.random()*4,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      vx:(Math.random()-.5)*5,vy:1.5+Math.random()*4,
      rot:Math.random()*360,vr:(Math.random()-.5)*7,alpha:1
    });
  }
  for(let i=0;i<14;i++){
    balloons.push({
      x:50+Math.random()*(canvas.width-100),
      y:canvas.height+60+Math.random()*120,
      r:20+Math.random()*16,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      vx:(Math.random()-.5)*1.5,
      vy:-(1.5+Math.random()*1.5),
      wobble:Math.random()*Math.PI*2,alpha:1
    });
  }
  if(!animId)loop();
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces=pieces.filter(p=>p.alpha>.01);
  pieces.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.rot+=p.vr;
    if(p.y>canvas.height*.75)p.alpha-=.012;
    ctx.save();ctx.globalAlpha=p.alpha;
    ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
    ctx.fillStyle=p.color;ctx.beginPath();
    ctx.ellipse(0,0,p.w/2,p.h/2,0,0,Math.PI*2);ctx.fill();ctx.restore();
  });
  balloons=balloons.filter(b=>b.alpha>.01);
  balloons.forEach(b=>{
    b.x+=b.vx+Math.sin(b.wobble)*.6;b.y+=b.vy;b.wobble+=.04;
    if(b.y<-100)b.alpha-=.025;
    ctx.save();ctx.globalAlpha=b.alpha;
    ctx.beginPath();ctx.ellipse(b.x,b.y,b.r,b.r*1.25,0,0,Math.PI*2);
    ctx.fillStyle=b.color;ctx.fill();
    ctx.beginPath();ctx.ellipse(b.x-b.r*.3,b.y-b.r*.4,b.r*.25,b.r*.35,-.4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.fill();
    ctx.beginPath();ctx.moveTo(b.x,b.y+b.r*1.25);
    ctx.bezierCurveTo(b.x+8,b.y+b.r*1.6,b.x-8,b.y+b.r*2,b.x,b.y+b.r*2.5);
    ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();
  });
  if(pieces.length||balloons.length){animId=requestAnimationFrame(loop);}
  else{animId=null;ctx.clearRect(0,0,canvas.width,canvas.height);}
}

setTimeout(launchAll,2000);
document.getElementById('partyBtn').addEventListener('click',launchAll);
</script>
</body>
</html>
